<h2>Orders</h2>
<div id="orders"></div>

<script>
fetch("http://localhost:3000/orders")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("orders");

    data.forEach(order => {
      container.innerHTML += `
        <div style="border:1px solid #ccc; margin:10px; padding:10px;">
          <h3>${order.product}</h3>
          <p>${order.name} - ${order.email}</p>
          <p>${order.message}</p>
        </div>
      `;
    });
  });
</script>
